<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youth Sports Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --secondary: #f59e0b;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: #2a2a2a;
      --danger: #ef4444;
      --danger-hover: #dc2626;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 40px 0 30px;
    }
    
    header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    
    header p {
      color: var(--text-muted);
      font-size: 14px;
    }
    
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }
    
    .tab {
      padding: 12px 24px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.15s ease;
    }
    
    .tab:hover { color: var(--text); }
    
    .tab.active {
      color: var(--text);
    }
    
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary);
    }
    
    .panel { display: none; }
    .panel.active { display: block; }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .section-header h2 {
      font-size: 20px;
      font-weight: 600;
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #000;
    }
    
    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    
    .btn-danger {
      background: var(--danger);
      color: #fff;
      padding: 6px 12px;
      font-size: 11px;
    }
    
    .btn-danger:hover { background: var(--danger-hover); }
    
    .btn-secondary {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover { border-color: var(--text-muted); }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      transition: border-color 0.15s ease;
    }
    
    .card:hover { border-color: var(--text-muted); }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .card-title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .card-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    
    .card-meta span {
      display: block;
      margin-bottom: 4px;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
    }
    
    .badge-beginner { background: #064e3b; color: #6ee7b7; }
    .badge-intermediate { background: #78350f; color: #fcd34d; }
    .badge-advanced { background: #7c3aed; color: #c4b5fd; }
    
    .team-card {
      grid-column: span 1;
    }
    
    .team-roster {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .team-roster strong { color: var(--text); }
    
    .schedule-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .schedule-info h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .schedule-info p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .schedule-type {
      padding: 6px 12px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
    }
    
    .schedule-type.game { background: #7c3aed; color: #c4b5fd; }
    .schedule-type.practice { background: #0c4a6e; color: #7dd3fc; }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 20px;
    }
    
    .modal-overlay.active { display: flex; }
    
    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
    }
    
    .modal h3 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.15s ease;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .form-group select {
      cursor: pointer;
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    .modal-actions .btn { flex: 1; }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    
    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .checkbox-group {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
    }
    
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .checkbox-item:last-child { border-bottom: none; }
    
    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    
    .checkbox-item label {
      font-size: 14px;
      cursor: pointer;
    }
    
    .schedule-empty {
      background: var(--card-bg);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 40px;
      text-align: center;
    }
    
    .schedule-empty p {
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    
    @media (max-width: 600px) {
      .container { padding: 16px; }
      header h1 { font-size: 24px; }
      .tab { padding: 10px 16px; font-size: 12px; }
      .grid { grid-template-columns: 1fr; }
      .section-header { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚽ Youth Sports Scheduler</h1>
      <p>Manage players, coaches, teams & schedules</p>
    </header>
    
    <div class="tabs">
      <button class="tab active" data-tab="players">Players</button>
      <button class="tab" data-tab="coaches">Coaches</button>
      <button class="tab" data-tab="teams">Teams</button>
      <button class="tab" data-tab="schedule">Schedule</button>
    </div>
    
    <!-- PLAYERS PANEL -->
    <div class="panel active" id="players">
      <div class="section-header">
        <h2>Players</h2>
        <button class="btn btn-primary" onclick="openModal('player')">+ Add Player</button>
      </div>
      <div class="grid" id="players-grid"></div>
    </div>
    
    <!-- COACHES PANEL -->
    <div class="panel" id="coaches">
      <div class="section-header">
        <h2>Coaches</h2>
        <button class="btn btn-primary" onclick="openModal('coach')">+ Add Coach</button>
      </div>
      <div class="grid" id="coaches-grid"></div>
    </div>
    
    <!-- TEAMS PANEL -->
    <div class="panel" id="teams">
      <div class="section-header">
        <h2>Teams</h2>
        <button class="btn btn-primary" onclick="openModal('team')">+ Create Team</button>
      </div>
      <div class="grid" id="teams-grid"></div>
    </div>
    
    <!-- SCHEDULE PANEL -->
    <div class="panel" id="schedule">
      <div class="section-header">
        <h2>Schedule</h2>
        <button class="btn btn-primary" onclick="generateSchedule()">⚡ Auto-Generate</button>
      </div>
      <div id="schedule-list"></div>
    </div>
  </div>
  
  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 id="modal-title">Add Item</h3>
      <form id="modal-form"></form>
      <div class="modal-actions">
        <button class="btn btn-secondary" type="button" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" type="submit" form="modal-form">Save</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let data = {
      players: [],
      coaches: [],
      teams: [],
      schedule: []
    };
    
    // Load from localStorage
    function loadData() {
      const saved = localStorage.getItem('youthSportsData');
      if (saved) {
        data = JSON.parse(saved);
      }
    }
    
    // Save to localStorage
    function saveData() {
      localStorage.setItem('youthSportsData', JSON.stringify(data));
    }
    
    // Generate IDs
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'schedule') renderSchedule();
      });
    });
    
    // Modal handling
    let currentModalType = '';
    
    function openModal(type) {
      currentModalType = type;
      const overlay = document.getElementById('modal-overlay');
      const title = document.getElementById('modal-title');
      const form = document.getElementById('modal-form');
      
      overlay.classList.add('active');
      
      if (type === 'player') {
        title.textContent = 'Add Player';
        form.innerHTML = `
          <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required placeholder="Player name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="email@example.com">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" placeholder="(555) 123-4567">
          </div>
          <div class="form-group">
            <label>Skill Level</label>
            <select name="skill">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        `;
      } else if (type === 'coach') {
        title.textContent = 'Add Coach';
        form.innerHTML = `
          <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required placeholder="Coach name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="email@example.com">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" placeholder="(555) 123-4567">
          </div>
          <div class="form-group">
            <label>Specialization</label>
            <select name="specialization">
              <option value="Soccer">Soccer</option>
              <option value="Basketball">Basketball</option>
              <option value="Baseball">Baseball</option>
              <option value="Football">Football</option>
              <option value="General">General</option>
            </select>
          </div>
        `;
      } else if (type === 'team') {
        title.textContent = 'Create Team';
        form.innerHTML = `
          <div class="form-group">
            <label>Team Name</label>
            <input type="text" name="name" required placeholder="Team name">
          </div>
          <div class="form-group">
            <label>Sport</label>
            <select name="sport">
              <option value="Soccer">Soccer</option>
              <option value="Basketball">Basketball</option>
              <option value="Baseball">Baseball</option>
              <option value="Football">Football</option>
            </select>
          </div>
          <div class="form-group">
            <label>Division</label>
            <select name="division">
              <option value="U8">U8</option>
              <option value="U10">U10</option>
              <option value="U12">U12</option>
              <option value="U14">U14</option>
            </select>
          </div>
          <div class="form-group">
            <label>Players</label>
            <div class="checkbox-group">
              ${data.players.map(p => `
                <div class="checkbox-item">
                  <input type="checkbox" id="player-${p.id}" name="players" value="${p.id}">
                  <label for="player-${p.id}">${p.name}</label>
                </div>
              `).join('') || '<p style="color:var(--text-muted);font-size:13px;">No players available</p>'}
            </div>
          </div>
          <div class="form-group">
            <label>Coach</label>
            <select name="coach">
              <option value="">-- Select Coach --</option>
              ${data.coaches.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
            </select>
          </div>
        `;
      } else if (type === 'edit-player') {
        title.textContent = 'Edit Player';
        form.innerHTML = `
          <input type="hidden" name="id" value="${data.editId}">
          <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required value="${data.editData.name}">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="${data.editData.email || ''}">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" value="${data.editData.phone || ''}">
          </div>
          <div class="form-group">
            <label>Skill Level</label>
            <select name="skill">
              <option value="beginner" ${data.editData.skill === 'beginner' ? 'selected' : ''}>Beginner</option>
              <option value="intermediate" ${data.editData.skill === 'intermediate' ? 'selected' : ''}>Intermediate</option>
              <option value="advanced" ${data.editData.skill === 'advanced' ? 'selected' : ''}>Advanced</option>
            </select>
          </div>
        `;
      } else if (type === 'edit-coach') {
        title.textContent = 'Edit Coach';
        form.innerHTML = `
          <input type="hidden" name="id" value="${data.editId}">
          <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required value="${data.editData.name}">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="${data.editData.email || ''}">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" value="${data.editData.phone || ''}">
          </div>
          <div class="form-group">
            <label>Specialization</label>
            <select name="specialization">
              <option value="Soccer" ${data.editData.specialization === 'Soccer' ? 'selected' : ''}>Soccer</option>
              <option value="Basketball" ${data.editData.specialization === 'Basketball' ? 'selected' : ''}>Basketball</option>
              <option value="Baseball" ${data.editData.specialization === 'Baseball' ? 'selected' : ''}>Baseball</option>
              <option value="Football" ${data.editData.specialization === 'Football' ? 'selected' : ''}>Football</option>
              <option value="General" ${data.editData.specialization === 'General' ? 'selected' : ''}>General</option>
            </select>
          </div>
        `;
      } else if (type === 'edit-team') {
        title.textContent = 'Edit Team';
        form.innerHTML = `
          <input type="hidden" name="id" value="${data.editId}">
          <div class="form-group">
            <label>Team Name</label>
            <input type="text" name="name" required value="${data.editData.name || ''}">
          </div>
          <div class="form-group">
            <label>Sport</label>
            <select name="sport">
              <option value="Soccer" ${data.editData.sport === 'Soccer' ? 'selected' : ''}>Soccer</option>
              <option value="Basketball" ${data.editData.sport === 'Basketball' ? 'selected' : ''}>Basketball</option>
              <option value="Baseball" ${data.editData.sport === 'Baseball' ? 'selected' : ''}>Baseball</option>
              <option value="Football" ${data.editData.sport === 'Football' ? 'selected' : ''}>Football</option>
            </select>
          </div>
          <div class="form-group">
            <label>Division</label>
            <select name="division">
              <option value="U8" ${data.editData.division === 'U8' ? 'selected' : ''}>U8</option>
              <option value="U10" ${data.editData.division === 'U10' ? 'selected' : ''}>U10</option>
              <option value="U12" ${data.editData.division === 'U12' ? 'selected' : ''}>U12</option>
              <option value="U14" ${data.editData.division === 'U14' ? 'selected' : ''}>U14</option>
            </select>
          </div>
          <div class="form-group">
            <label>Coach</label>
            <select name="coach">
              <option value="">-- Select Coach --</option>
              ${data.coaches.map(c => `<option value="${c.id}" ${data.editData.coach === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Players</label>
            <div class="checkbox-group">
              ${data.players.map(p => `<div class="checkbox-item"><input type="checkbox" id="player-${p.id}" name="players" value="${p.id}" ${data.editData.players?.includes(p.id) ? 'checked' : ''}><label for="player-${p.id}">${p.name}</label></div>`).join('') || '<p style="color:var(--text-muted);font-size:13px;">No players available</p>'}
            </div>
          </div>
        `;
      }
      
      form.addEventListener('submit', handleFormSubmit);
    }
    
    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
    }
    
    function handleFormSubmit(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const obj = Object.fromEntries(formData);
      
      if (currentModalType === 'player') {
        data.players.push({ id: generateId(), ...obj });
      } else if (currentModalType === 'coach') {
        data.coaches.push({ id: generateId(), ...obj });
      } else if (currentModalType === 'team') {
        const selectedPlayers = formData.getAll('players');
        data.teams.push({ id: generateId(), ...obj, players: selectedPlayers });
      } else if (currentModalType === 'edit-player') {
        const idx = data.players.findIndex(p => p.id === obj.id);
        if (idx !== -1) data.players[idx] = { ...data.players[idx], ...obj };
      } else if (currentModalType === 'edit-coach') {
        const idx = data.coaches.findIndex(c => c.id === obj.id);
        if (idx !== -1) data.coaches[idx] = { ...data.coaches[idx], ...obj };
      } else if (currentModalType === 'edit-team') {
        const selectedPlayers = formData.getAll('players');
        const idx = data.teams.findIndex(t => t.id === obj.id);
        if (idx !== -1) {
          data.teams[idx] = { ...data.teams[idx], name: obj.name, sport: obj.sport, division: obj.division, coach: obj.coach, players: selectedPlayers };
        }
      }
      
      saveData();
      closeModal();
      renderAll();
    }
    
    // Render functions
    function renderPlayers() {
      const grid = document.getElementById('players-grid');
      if (data.players.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>No players yet</h3><p>Add your first player to get started</p></div>';
        return;
      }
      grid.innerHTML = data.players.map(p => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${p.name}</span>
            <span class="badge badge-${p.skill}">${p.skill}</span>
          </div>
          <div class="card-meta">
            ${p.email ? `<span>📧 ${p.email}</span>` : ''}
            ${p.phone ? `<span>📞 ${p.phone}</span>` : ''}
          </div>
          <div style="margin-top:16px;display:flex;gap:8px;">
            <button class="btn btn-secondary" style="padding:6px 12px;font-size:11px;" onclick="editItem('player','${p.id}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteItem('player','${p.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    function renderCoaches() {
      const grid = document.getElementById('coaches-grid');
      if (data.coaches.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>No coaches yet</h3><p>Add your first coach to get started</p></div>';
        return;
      }
      grid.innerHTML = data.coaches.map(c => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${c.name}</span>
            <span class="badge" style="background:#1e3a5f;color:#7dd3fc;">${c.specialization}</span>
          </div>
          <div class="card-meta">
            ${c.email ? `<span>📧 ${c.email}</span>` : ''}
            ${c.phone ? `<span>📞 ${c.phone}</span>` : ''}
          </div>
          <div style="margin-top:16px;display:flex;gap:8px;">
            <button class="btn btn-secondary" style="padding:6px 12px;font-size:11px;" onclick="editItem('coach','${c.id}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteItem('coach','${c.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    function renderTeams() {
      const grid = document.getElementById('teams-grid');
      if (data.teams.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>No teams yet</h3><p>Create your first team to get started</p></div>';
        return;
      }
      grid.innerHTML = data.teams.map(t => {
        const playerNames = t.players?.map(pid => data.players.find(p => p.id === pid)?.name).filter(Boolean).join(', ') || 'None';
        const coach = t.coach ? data.coaches.find(c => c.id === t.coach) : null;
        return `
          <div class="card team-card">
            <div class="card-header">
              <span class="card-title">${t.name}</span>
              <span class="badge" style="background:#1f2937;color:#9ca3af;">${t.sport} · ${t.division}</span>
            </div>
            <div class="team-roster">
              <strong>Players:</strong> ${playerNames}
              ${coach ? `<br><strong>Coach:</strong> ${coach.name}` : ''}
            </div>
            <div style="margin-top:16px;display:flex;gap:8px;">
              <button class="btn btn-secondary" style="padding:6px 12px;font-size:11px;" onclick="editItem('team','${t.id}')">Edit</button>
              <button class="btn btn-danger" onclick="deleteItem('team','${t.id}')">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function renderSchedule() {
      const list = document.getElementById('schedule-list');
      if (data.schedule.length === 0) {
        list.innerHTML = '<div class="schedule-empty"><p>No games or practices scheduled</p><button class="btn btn-primary" onclick="generateSchedule()">⚡ Auto-Generate Schedule</button></div>';
        return;
      }
      
      const sorted = [...data.schedule].sort((a, b) => new Date(a.date) - new Date(b.date));
      list.innerHTML = sorted.map(s => {
        const teamNames = s.teams?.map(tid => data.teams.find(t => t.id === tid)?.name).filter(Boolean).join(' vs ') || 'TBD';
        return `
          <div class="schedule-item">
            <div class="schedule-info">
              <h3>${teamNames}</h3>
              <p>${formatDate(s.date)} at ${s.time}</p>
            </div>
            <span class="schedule-type ${s.type}">${s.type}</span>
          </div>
        `;
      }).join('');
    }
    
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    
    // Edit/Delete
    function editItem(type, id) {
      if (type === 'player') {
        const p = data.players.find(x => x.id === id);
        data.editId = id;
        data.editData = p;
        openModal('edit-player');
      } else if (type === 'coach') {
        const c = data.coaches.find(x => x.id === id);
        data.editId = id;
        data.editData = c;
        openModal('edit-coach');
      } else if (type === 'team') {
        const t = data.teams.find(x => x.id === id);
        data.editId = id;
        data.editData = t;
        openModal('edit-team');
      }
    }
    
    function deleteItem(type, id) {
      if (!confirm('Are you sure you want to delete this?')) return;
      
      if (type === 'player') {
        data.players = data.players.filter(p => p.id !== id);
        data.teams.forEach(t => {
          t.players = t.players?.filter(pid => pid !== id);
        });
      } else if (type === 'coach') {
        data.coaches = data.coaches.filter(c => c.id !== id);
        data.teams.forEach(t => {
          if (t.coach === id) t.coach = '';
        });
      } else if (type === 'team') {
        data.teams = data.teams.filter(t => t.id !== id);
      }
      
      saveData();
      renderAll();
    }
    
    // Schedule generation
    function generateSchedule() {
      if (data.teams.length < 2) {
        alert('Need at least 2 teams to generate schedule!');
        return;
      }
      
      data.schedule = [];
      const teams = [...data.teams];
      const timeSlots = ['09:00', '11:00', '14:00', '16:00'];
      const today = new Date();
      
      // Generate games (round robin style)
      for (let i = 0; i < teams.length; i++) {
        for (let j = i + 1; j < teams.length; j++) {
          const gameDate = new Date(today);
          gameDate.setDate(today.getDate() + Math.floor(Math.random() * 14) + 1);
          const time = timeSlots[Math.floor(Math.random() * timeSlots.length)];
          
          data.schedule.push({
            id: generateId(),
            type: 'game',
            teams: [teams[i].id, teams[j].id],
            date: gameDate.toISOString().split('T')[0],
            time: time
          });
        }
      }
      
      // Add practice sessions
      teams.forEach((team, idx) => {
        const pracDate = new Date(today);
        pracDate.setDate(today.getDate() + Math.floor(Math.random() * 7) + 1);
        data.schedule.push({
          id: generateId(),
          type: 'practice',
          teams: [team.id],
          date: pracDate.toISOString().split('T')[0],
          time: timeSlots[idx % timeSlots.length]
        });
      });
      
      saveData();
      renderSchedule();
    }
    
    function renderAll() {
      renderPlayers();
      renderCoaches();
      renderTeams();
    }
    
    // Initialize
    loadData();
    renderAll();
  </script>
</body>
</html>
